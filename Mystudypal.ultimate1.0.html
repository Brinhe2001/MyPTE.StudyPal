<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贺布林八炸空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=ZCOOL+XiaoWei&display=swap');

        body {
            background-color: #f5f7f6;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        /* 顶部 Banner 区域：调用同文件夹下的照片 */
        .top-banner {
            width: 100%;
            height: 380px; 
            /* 寻找同文件夹下的这张照片 */
            background-image: url('IMG_3213 5.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #2d4f39; /* 保护色 */
            border-bottom: 6px solid #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 标题区域 */
        .header-title-section {
            background-color: #ffffff;
            padding: 3.5rem 0 2.5rem 0;
            text-align: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #eef2ef;
        }

        .main-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 3.5rem;
            color: #1a3c2a; 
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
        }

        .sub-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.3rem;
            color: #4a6356;
            letter-spacing: 0.6em;
            margin-left: 0.6em;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 15px 35px rgba(26, 60, 42, 0.05);
        }

        .tab-btn { transition: all 0.3s ease; }
        .tab-active { color: #1a3c2a; border-bottom: 4px solid #2d6a4f; font-weight: 900; }
        .tab-inactive { color: #94a3b8; border-bottom: 4px solid transparent; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-banner"></div>

    <header class="header-title-section">
        <h1 class="main-title">贺布林八炸空间</h1>
        <p class="sub-title">日拱一卒 功不唐捐</p>
    </header>

    <main class="max-w-[1200px] mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-10 pb-20">
        <div class="lg:col-span-5 space-y-8">
            <div class="glass-panel p-10">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-xl font-black text-emerald-900 flex items-center">
                        <span class="mr-3">⏱️</span> 专注实验室
                    </h2>
                    <div id="display" class="text-4xl font-mono text-emerald-950 font-medium">00:00:00</div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div>
                        <label class="text-[10px] font-bold text-emerald-700 uppercase mb-2 block ml-1">步骤 1: 板块</label>
                        <select id="mainCat" onchange="updateSub()" class="w-full bg-white border border-emerald-100 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 outline-none shadow-sm">
                            <option value="">请选择</option>
                            <option value="Speaking">Speaking (口语)</option>
                            <option value="Writing">Writing (写作)</option>
                            <option value="Listening">Listening (听力)</option>
                            <option value="Reading">Reading (阅读)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-emerald-700 uppercase mb-2 block ml-1">步骤 2: 题型</label>
                        <select id="subCat" disabled class="w-full bg-gray-50 border border-emerald-100 rounded-xl px-4 py-3 text-sm outline-none">
                            <option value="">待选大项</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button id="startBtn" onclick="toggleTimer()" class="flex-[2] bg-emerald-800 hover:bg-emerald-900 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">开始专注</button>
                    <button onclick="resetTimer()" class="flex-1 bg-white border border-emerald-100 text-emerald-800 font-bold py-4 rounded-2xl transition-all">重置</button>
                </div>
                <button onclick="recordTime()" class="w-full mt-4 bg-gray-800 text-white font-bold py-4 rounded-2xl hover:bg-gray-900 transition-all shadow-md">完成打卡存档</button>
            </div>

            <div class="glass-panel p-10">
                <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
                    <span class="mr-3">💡</span> 复盘笔记
                </h2>
                <textarea id="noteIn" rows="4" placeholder="在此记录此刻的学习避坑心得..." class="w-full bg-slate-50 border-none rounded-2xl p-5 text-sm focus:ring-2 focus:ring-emerald-500/20 outline-none resize-none mb-6 shadow-inner"></textarea>
                <button onclick="saveNote()" class="w-full bg-[#5c6b5e] text-white font-bold py-4 rounded-2xl hover:bg-[#4a574c] transition-all">保存至锦囊</button>
            </div>
        </div>

        <div class="lg:col-span-7 glass-panel p-10 flex flex-col h-[820px]">
            <h2 class="text-2xl font-black text-slate-800 mb-8 flex items-center">
                <span class="mr-4">📊</span> 练习历史记录
            </h2>
            
            <div class="flex border-b border-slate-100 mb-8">
                <button onclick="showTab('time')" id="t-time" class="flex-1 tab-btn pb-4 text-sm tab-active">时长记录</button>
                <button onclick="showTab('note')" id="t-note" class="flex-1 tab-btn pb-4 text-sm tab-inactive">心得笔记</button>
                <button onclick="showTab('extra')" id="t-extra" class="flex-1 tab-btn pb-4 text-sm tab-inactive">题量批注</button>
            </div>

            <div id="board" class="flex-1 overflow-y-auto custom-scroll pr-3 space-y-5">
            </div>
        </div>
    </main>

    <script>
        const categories = {
            "Speaking": ["RA", "RS", "DI", "RL", "SGD", "RTS"],
            "Writing": ["WE", "SWT"],
            "Listening": ["SST", "WFD"],
            "Reading": ["FIB-R", "FIB-RW", "RO"]
        };

        let logs = JSON.parse(localStorage.getItem('heb_logs')) || [];
        let notes = JSON.parse(localStorage.getItem('heb_notes')) || [];
        let curTab = 'time';

        function updateSub() {
            const m = document.getElementById('mainCat').value;
            const s = document.getElementById('subCat');
            s.innerHTML = '<option value="">具体题型</option>';
            if (m) {
                s.disabled = false;
                categories[m].forEach(t => {
                    let o = document.createElement('option');
                    o.value = t; o.innerText = t; s.appendChild(o);
                });
            } else { s.disabled = true; }
        }

        let timer = null, seconds = 0, isRunning = false;
        function format(sec) { return new Date(sec * 1000).toISOString().substr(11, 8); }

        function toggleTimer() {
            if (!document.getElementById('subCat').value) return alert("请先选好题型！");
            if (!isRunning) {
                timer = setInterval(() => { seconds++; document.getElementById('display').innerText = format(seconds); }, 1000);
                document.getElementById('startBtn').innerText = "计时中...";
                document.getElementById('startBtn').classList.replace('bg-emerald-800', 'bg-rose-700');
            } else {
                clearInterval(timer);
                document.getElementById('startBtn').innerText = "继续专注";
                document.getElementById('startBtn').classList.replace('bg-rose-700', 'bg-emerald-800');
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timer); isRunning = false; seconds = 0;
            document.getElementById('display').innerText = "00:00:00";
            document.getElementById('startBtn').innerText = "开始专注";
            document.getElementById('startBtn').className = "flex-[2] bg-emerald-800 hover:bg-emerald-900 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95";
        }

        function recordTime() {
            if (seconds < 1) return;
            logs.unshift({ id: Date.now(), date: new Date().toLocaleString(), type: document.getElementById('subCat').value, duration: format(seconds), extra: "" });
            localStorage.setItem('heb_logs', JSON.stringify(logs));
            resetTimer(); render();
        }

        function saveNote() {
            const val = document.getElementById('noteIn').value.trim();
            if (!val) return;
            notes.unshift({ date: new Date().toLocaleString(), content: val });
            localStorage.setItem('heb_notes', JSON.stringify(notes));
            document.getElementById('noteIn').value = ""; showTab('note');
        }

        function showTab(t) {
            curTab = t;
            ['time', 'note', 'extra'].forEach(x => {
                document.getElementById(`t-${x}`).className = x === t ? "flex-1 tab-btn pb-4 text-sm tab-active" : "flex-1 tab-btn pb-4 text-sm tab-inactive";
            });
            render();
        }

        function render() {
            const b = document.getElementById('board'); b.innerHTML = "";
            if (curTab === 'time') {
                logs.forEach(l => {
                    b.innerHTML += `<div class="p-6 bg-white border border-slate-50 rounded-3xl flex justify-between items-center shadow-sm hover:shadow-md transition-shadow">
                        <div><p class="text-[10px] font-bold text-emerald-800 mb-1">${l.date}</p><p class="text-xl font-black text-slate-800">${l.type}</p></div>
                        <div class="text-3xl font-mono text-emerald-900">${l.duration}</div>
                    </div>`;
                });
            } else if (curTab === 'note') {
                notes.forEach(n => {
                    b.innerHTML += `<div class="p-6 bg-[#fafafa] rounded-3xl border border-slate-100 shadow-sm"><p class="text-[10px] font-bold text-slate-400 mb-3">${n.date}</p><p class="text-slate-700 text-sm leading-relaxed">${n.content}</p></div>`;
                });
            } else if (curTab === 'extra') {
                logs.forEach(l => {
                    b.innerHTML += `<div class="p-5 bg-white rounded-3xl border border-slate-100 space-y-4 shadow-sm">
                        <div class="flex justify-between text-[10px] font-bold text-emerald-800"><span>练习项目: ${l.type}</span><span>打卡时间: ${l.date}</span></div>
                        <div class="flex gap-3">
                            <input id="ex-${l.id}" value="${l.extra}" class="flex-1 bg-slate-50 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-emerald-500 shadow-inner" placeholder="在此标注题量, 如: 15道, 命中12道">
                            <button onclick="saveExtra(${l.id})" class="bg-emerald-900 text-white px-5 rounded-xl text-xs font-bold transition-all active:scale-95">保存标注</button>
                        </div>
                    </div>`;
                });
            }
        }

        function saveExtra(id) {
            const val = document.getElementById(`ex-${id}`).value;
            const i = logs.findIndex(x => x.id === id);
            if (i !== -1) {
                logs[i].extra = val;
                localStorage.setItem('heb_logs', JSON.stringify(logs));
                render();
            }
        }
        window.onload = render;
    </script>
</body>
</html>.
